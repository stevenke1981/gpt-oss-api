# ============================================================
# GPT-OSS 20B 模型部署設定檔
# ============================================================

[model]
HF_REPO=DavidAU/OpenAi-GPT-oss-20b-abliterated-uncensored-NEO-Imatrix-gguf
MODELS_DIR=./models

# 預設下載模型 (可在下載腳本中選擇)
DEFAULT_MODEL=OpenAI-20B-NEO-Uncensored2-IQ4_NL.gguf

[server]
# 127.0.0.1 = 僅本機, 0.0.0.0 = 開放區網
HOST=127.0.0.1
PORT=8080
# 0 = 全部用 CPU，-1 = 全部 offload 到 GPU
N_GPU_LAYERS=0
N_THREADS=8

# 啟用 Jinja2 chat template (需要自訂 function call 時設為 true)
# 注意: true 時模型會嘗試使用 native tool format, 傳 URL 給模型會觸發 500 錯誤
ENABLE_JINJA=false

[inference]
# 上下文長度 (最小 8192，最大 131072)
CTX_SIZE=8192
# 平行處理槽數
N_PARALLEL=4
# 批次大小
BATCH_SIZE=512

[stability]
# KV cache 量化類型 — q8_0 可避免 pos_min==-1 assertion crash
# 可選值: f16, q8_0, q4_0, q4_1
CACHE_TYPE_K=q8_0
CACHE_TYPE_V=q8_0
# KV cache 碎片整理閾值 (0.0 停用, 0.1 建議值)
DEFRAG_THOLD=0.1
# 停用 Flash Attention — 減少多輪對話 KV 管理 bug (true=停用)
DISABLE_FLASH_ATTN=false

[sampling]
TEMPERATURE=0.8
REPEAT_PENALTY=1.1
TOP_K=40
TOP_P=0.95
MIN_P=0.05
SMOOTHING_FACTOR=1.5

