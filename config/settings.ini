# ============================================================
# GPT-OSS 20B 模型部署設定檔
# ============================================================

[model]
HF_REPO=DavidAU/OpenAi-GPT-oss-20b-abliterated-uncensored-NEO-Imatrix-gguf
MODELS_DIR=./models

# 預設下載模型 (可在下載腳本中選擇)
DEFAULT_MODEL=OpenAI-20B-NEO-Uncensored2-IQ4_NL.gguf

[server]
HOST=127.0.0.1
PORT=8080
# 0 = 全部用 CPU，-1 = 全部 offload 到 GPU
N_GPU_LAYERS=0
N_THREADS=8

[inference]
# 上下文長度 (最小 8192，最大 131072)
CTX_SIZE=8192
# 平行處理槽數
N_PARALLEL=4
# 批次大小
BATCH_SIZE=512

[sampling]
TEMPERATURE=0.8
REPEAT_PENALTY=1.1
TOP_K=40
TOP_P=0.95
MIN_P=0.05
SMOOTHING_FACTOR=1.5

